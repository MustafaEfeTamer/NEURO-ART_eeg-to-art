<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>NÖRO-ART Research Dashboard</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#38e07b",
                        "background-light": "#f6f8f7",
                        "background-dark": "#122017",
                        "surface": "#1A2C23",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"],
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f4f2;
        }

        ::-webkit-scrollbar-thumb {
            background: #a3c4b1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #38e07b;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        .gallery-bg {
            background-color: #f0f4f8;
            background-image: url('https://images.unsplash.com/photo-1577720580479-7d839d829c73?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .painting-frame {
            box-shadow:
                inset 0 0 30px rgba(0, 0, 0, 0.6),
                0 25px 60px rgba(0, 0, 0, 0.4),
                0 0 0 15px #3e2723,
                /* Dark wood */
                0 0 0 25px #d4af37,
                /* Gold rim */
                0 0 0 30px #2a1b12;
            /* Outer dark rim */
            border-radius: 2px;
            background-color: #fff;
            position: relative;
        }

        .painting-frame::after {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        .text-dark {
            color: #1a2c23;
        }
    </style>
</head>

<body class="gallery-bg min-h-screen text-dark font-display overflow-x-hidden overflow-y-auto flex flex-col">
    <header class="w-full glass-panel px-6 py-4 z-20 sticky top-0">
        <div class="max-w-[1400px] mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
            </div>
            <h1
                class="text-xl md:text-2xl font-semibold tracking-tight text-center absolute left-1/2 -translate-x-1/2 w-full md:w-auto pointer-events-none text-gray-800">
                NÖRO-ART
            </h1>
            <div class="flex items-center gap-3">
                <button
                    class="size-9 flex items-center justify-center rounded-full hover:bg-black/5 text-gray-600 transition-colors">
                    <span class="material-symbols-outlined">settings</span>
                </button>

            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col w-full max-w-[1600px] mx-auto p-4 md:p-6 gap-6 relative">

        <section
            class="glass-panel rounded-2xl p-4 lg:h-24 grid grid-cols-1 lg:grid-cols-12 gap-4 lg:gap-6 items-center z-10 w-full">
            <div class="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-12 px-2 md:px-4">
                <div class="flex flex-col gap-2">
                    <div
                        class="flex justify-between items-center text-xs text-gray-600 font-mono uppercase tracking-wider font-bold">
                        <span>Valence</span>
                        <span class="bg-gray-200 px-1.5 rounded text-gray-800" id="valence-value">0.75</span>
                    </div>
                    <div class="relative flex items-center h-6 w-full group cursor-pointer">
                        <div class="absolute w-full h-1 bg-gray-300 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-gray-400 to-[#38e07b] w-[75%]" id="valence-bar">
                            </div>
                        </div>
                        <div class="absolute left-[75%] size-4 bg-[#38e07b] rounded-full shadow-[0_0_10px_rgba(56,224,123,0.5)] border-2 border-white transition-transform group-hover:scale-125"
                            id="valence-handle"></div>
                    </div>
                    <div class="flex justify-between text-[10px] text-gray-500 font-mono font-semibold">
                        <span>Negative</span><span>Neutral</span><span>Positive</span>
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <div
                        class="flex justify-between items-center text-xs text-gray-600 font-mono uppercase tracking-wider font-bold">
                        <span>Arousal</span>
                        <span class="bg-gray-200 px-1.5 rounded text-gray-800" id="arousal-value">-0.20</span>
                    </div>
                    <div class="relative flex items-center h-6 w-full group cursor-pointer">
                        <div class="absolute w-full h-1 bg-gray-300 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-gray-400 to-[#7f5af0] w-[40%]" id="arousal-bar">
                            </div>
                        </div>
                        <div class="absolute left-[40%] size-4 bg-[#7f5af0] rounded-full shadow-[0_0_10px_rgba(127,90,240,0.5)] border-2 border-white transition-transform group-hover:scale-125"
                            id="arousal-handle"></div>
                    </div>
                    <div class="flex justify-between text-[10px] text-gray-500 font-mono font-semibold">
                        <span>Calm</span><span>Neutral</span><span>Excited</span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 h-full border-l border-gray-300 pl-6 flex items-center gap-4">
                <div class="flex flex-col justify-center gap-1">
                    <span class="text-xs text-gray-500 font-mono uppercase font-bold">2D Emotion Map</span>
                    <span class="text-sm font-bold text-gray-800" id="map-description">High Valence, Low Arousal</span>
                </div>
                <div
                    class="h-16 w-32 bg-white rounded border border-gray-200 relative overflow-hidden ml-auto shadow-inner">
                    <div class="absolute inset-0 grid grid-cols-4 grid-rows-4 opacity-40 pointer-events-none">
                        <div class="border-b border-r border-[#38e07b]/30 h-full w-full absolute"></div>
                    </div>
                    <div class="absolute top-1/2 left-0 w-full h-px bg-gray-300"></div>
                    <div class="absolute left-1/2 top-0 h-full w-px bg-gray-300"></div>
                    <div class="absolute top-[60%] left-[75%] size-3 bg-[#38e07b] rounded-full shadow-[0_0_8px_#38e07b] border border-white animate-pulse"
                        id="map-point"></div>
                </div>
            </div>
        </section>

        <section
            class="relative flex-1 rounded-[2rem] overflow-hidden group flex flex-col lg:flex-row items-center justify-center p-4 md:p-8 gap-6 md:gap-12 min-h-[500px]">

            <div
                class="hidden lg:flex painting-frame w-1/4 max-w-[300px] aspect-[3/4] flex items-center justify-center shadow-xl opacity-90 transition-all duration-500 bg-white hover:opacity-100 hover:scale-[1.02]">
                <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&w=600&q=80"
                    alt="Previous art 1" class="w-full h-full object-cover p-1.5" />
            </div>

            <div
                class="z-10 painting-frame w-full max-w-2xl max-h-[70vh] aspect-[4/3] flex items-center justify-center shadow-2xl transition-all duration-700 bg-white mx-auto">
                <img id="art-image" alt="Generated abstract art"
                    class="w-full h-full object-cover hidden transition-opacity duration-1000 p-2" />

                <div id="art-loading"
                    class="absolute inset-0 z-20 hidden flex-col items-center justify-center bg-white/80 backdrop-blur-sm">
                    <div class="size-12 rounded-full border-4 border-[#38e07b]/30 border-t-[#38e07b] animate-spin mb-4">
                    </div>
                    <span class="text-gray-800 font-mono text-sm tracking-widest animate-pulse font-bold">PAINTING IN
                        PROGRESS...</span>
                </div>

                <div id="art-placeholder"
                    class="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
                    <span class="material-symbols-outlined text-4xl mb-3 opacity-50">brush</span>
                    <span class="font-mono text-sm uppercase px-10 text-center font-bold tracking-wide">Press "Capture
                        Art"<br />to paint on the canvas</span>
                </div>
            </div>

            <div
                class="hidden lg:flex painting-frame w-1/4 max-w-[300px] aspect-[3/4] flex items-center justify-center shadow-xl opacity-90 transition-all duration-500 bg-white hover:opacity-100 hover:scale-[1.02]">
                <img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&w=600&q=80"
                    alt="Previous art 2" class="w-full h-full object-cover p-1.5" />
            </div>

            <div class="absolute bottom-4 left-4 md:bottom-8 md:left-8 w-full max-w-xs z-30">
                <div
                    class="glass-panel p-5 rounded-[1.5rem] flex flex-col gap-3 transition-transform hover:-translate-y-1 duration-300">
                    <div class="flex items-center justify-between border-b border-black/10 pb-2">
                        <span class="text-xs font-mono text-gray-600 uppercase tracking-wider font-bold">Detected
                            State</span>
                    </div>
                    <div>
                        <h2 class="text-2xl font-light text-gray-900 leading-tight font-semibold"
                            id="detected-state-title">Peaceful
                            <span class="text-[#7f5af0]">&</span> Relaxed
                        </h2>
                        <p class="text-sm text-gray-500 mt-1 font-medium" id="detected-state-desc">Waiting for input...
                        </p>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-4 right-4 md:bottom-8 md:right-8 w-full max-w-[280px] z-30">
                <div
                    class="glass-panel p-5 rounded-[1.5rem] flex flex-col gap-4 transition-transform hover:-translate-y-1 duration-300">
                    <div class="flex items-center justify-between border-b border-black/10 pb-2">
                        <span class="text-xs font-mono text-gray-600 uppercase tracking-wider font-bold">Session
                            Actions</span>
                        <span class="size-2 rounded-full bg-red-500 animate-pulse" title="Recording"></span>
                    </div>
                    <div class="grid grid-cols-2 gap-2">

                        <!-- Calibration Button -->
                        <button id="btn-kalibre-et"
                            class="col-span-2 flex items-center justify-center gap-2 bg-white/70 hover:bg-white border border-gray-300 hover:border-[#7f5af0] text-gray-700 hover:text-[#7f5af0] font-semibold py-2.5 px-4 rounded-full transition-all active:scale-95 text-sm">
                            <span class="material-symbols-outlined text-base">tune</span>
                            Kişisel Kalibrasyon (15sn)
                        </button>

                        <!-- Calibration Status Badge -->
                        <div id="kalibrasyon-durumu-wrap"
                            class="col-span-2 flex items-center gap-2 bg-gray-100/80 rounded-xl px-3 py-2 text-xs font-mono text-gray-500 min-h-[32px] transition-all">
                            <span class="size-2 rounded-full bg-gray-400 flex-shrink-0" id="kalibrasyon-led"></span>
                            <span id="kalibrasyon-durumu">Durum: Bekleniyor...</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 🔑 API CONFIGURATION
        const API_KEY = "YOUR_POLLINATIONS_API_KEY_HERE"; // Kendi API anahtarınızı buraya girin

        // 1. RULE-BASED MAPPING
        function buildPrompt(v, a) {

            if (v >= 0.5 && a >= 0.5) return "abstract fluid art, explosion of vivid neon colors, energetic splashes, dynamic composition, joyful, euphoric, 8k resolution, cinematic lighting, digital art masterpiece";
            if (v >= 0.5 && a >= 0 && a < 0.5) return "vivid colorful abstract motion, bright neon gradients, playful particles, energetic composition";
            if (v >= 0.5 && a >= -0.5 && a < 0) return "ethereal glowing abstract, soft pastel lights, calm dreamlike atmosphere, smooth flowing textures";
            if (v >= 0.5 && a < -0.5) return "peaceful luminous abstract landscape, calm ocean tones, serene flowing shapes, gentle lighting";

            if (v >= 0 && v < 0.5 && a >= 0.5) return "dynamic abstract color storm, energetic brush strokes, vibrant splashes, joyful movement";
            if (v >= 0 && v < 0.5 && a >= 0 && a < 0.5) return "soft abstract fluid art, pastel gradients, dreamy textures, balanced harmony";
            if (v >= 0 && v < 0.5 && a >= -0.5 && a < 0) return "calm atmospheric abstract, smooth blue tones, quiet emotional landscape";
            if (v >= 0 && v < 0.5 && a < -0.5) return "gentle minimalist abstract, soft fog textures, peaceful muted colors";

            if (v >= -0.5 && v < 0 && a >= 0.5) return "dark energetic abstract, sharp red strokes, chaotic geometry, dramatic tension";
            if (v >= -0.5 && v < 0 && a >= 0 && a < 0.5) return "dramatic moody abstract art, purple shadows, unstable flowing shapes";
            if (v >= -0.5 && v < 0 && a >= -0.5 && a < 0) return "melancholic abstract landscape, desaturated tones, slow drifting textures";
            if (v >= -0.5 && v < 0 && a < -0.5) return "lonely minimalist abstract, gray fog atmosphere, quiet sadness";

            if (v < -0.5 && a >= 0.5) return "dark chaotic abstract art, sharp jagged geometric shapes, intense red and black contrast, glitch art style, aggressive brush strokes, stormy dramatic tension";
            if (v < -0.5 && a >= 0 && a < 0.5) return "intense dark abstract motion, broken shapes, red flashes, unstable composition";
            if (v < -0.5 && a >= -0.5 && a < 0) return "deep melancholic abstract art, dark blue fog, heavy emotional atmosphere";
            return "minimalist melancholic abstract, muted desaturated tones, gray and dark blue, foggy atmosphere, lonely, slow moving forms, rain textures, soft grain, depression";
        }

        // 2. UI MANAGEMENT
        function setLoading(isLoading) {
            const loadingDiv = document.getElementById("art-loading");
            if (!loadingDiv) return;
            if (isLoading) {
                loadingDiv.classList.remove("hidden");
                loadingDiv.classList.add("flex");
            } else {
                loadingDiv.classList.add("hidden");
                loadingDiv.classList.remove("flex");
            }
        }

        // 3. FETCH IMAGE WITH API KEY (GÜNCELLENEN KISIM)
        async function fetchAndShowArt(prompt, seed) {
            setLoading(true);
            const img = document.getElementById("art-image");

            // Temel URL (Feed URL'si değil, image endpoint'i)
            // Dokümantasyona göre GET isteği yapıyoruz, parametreleri URL'e ekliyoruz.
            // API Key Header ile gönderilecek.

            const baseUrl = `https://gen.pollinations.ai/image/${encodeURIComponent(prompt)}`;
            const params = new URLSearchParams({
                width: "1280",
                height: "720",
                seed: String(seed),
                nologo: "true",
                model: "flux" // veya "turbo"
            });

            const fullUrl = `${baseUrl}?${params.toString()}`;

            try {
                // fetch fonksiyonu ile Header ekleyerek istek atıyoruz
                const response = await fetch(fullUrl, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                    }
                });

                if (!response.ok) {
                    throw new Error(`API Hatası: ${response.status} ${response.statusText}`);
                }

                // Gelen veriyi (Blob) resme çevir
                const blob = await response.blob();
                const objectUrl = URL.createObjectURL(blob);

                img.onload = () => {
                    setLoading(false);
                    img.classList.remove("hidden");
                    const placeholder = document.getElementById("art-placeholder");
                    if (placeholder) placeholder.classList.add("hidden");
                    // Bellek temizliği (isteğe bağlı ama iyi pratik)
                    // URL.revokeObjectURL(objectUrl); 
                };

                img.src = objectUrl;
                console.log("Görsel başarıyla çekildi ve işlendi.");

            } catch (error) {
                console.error("Hata:", error);
                setLoading(false);
                alert("Görsel oluşturulurken bir hata oluştu: " + error.message);
            }
        }

        // Capture art butonuna bastıkça yeni valance ve arousal değer üretimi ve resim üretimi
        /* document.getElementById('capture-art-btn').addEventListener('click', async function () {

            try {
                const response = await fetch("http://127.0.0.1:5000/predict");

                if (!response.ok) {
                    throw new Error("Backend çalışmıyor");
                }

                const data = await response.json();

                const valence = data.valence.toFixed(2);
                const arousal = data.arousal.toFixed(2);

                // UI güncelle
                updateUI(valence, arousal);

                // Prompt oluştur
                const prompt = buildPrompt(parseFloat(valence), parseFloat(arousal));

                const seed = Math.floor(Math.random() * 1000000);

                // Görsel üret
                fetchAndShowArt(prompt, seed);

            } catch (error) {
                console.error("Hata:", error);
                alert("Backend bağlantı hatası!");
            }
        }); */

        async function runNeuroArt() {

            try {
                const response = await fetch("http://127.0.0.1:5000/predict");
                const data = await response.json();

                const valence = data.valence;
                const arousal = data.arousal;

                // UI güncelle
                updateUI(valence.toFixed(2), arousal.toFixed(2));

                // Prompt oluştur
                const prompt = buildPrompt(valence, arousal);

                const seed = Math.floor(Math.random() * 1000000);

                // Görsel üret
                fetchAndShowArt(prompt, seed);

            } catch (error) {
                console.error("Hata:", error);
            }
        }

        // Yardımcı UI Fonksiyonları
        function updateUI(v, a) {
            document.getElementById('valence-value').textContent = v;
            document.getElementById('arousal-value').textContent = a;
            const vPct = ((parseFloat(v) + 1) / 2) * 100;
            const aPct = ((parseFloat(a) + 1) / 2) * 100;
            document.getElementById('valence-bar').style.width = `${vPct}%`;
            document.getElementById('valence-handle').style.left = `${vPct}%`;
            document.getElementById('arousal-bar').style.width = `${aPct}%`;
            document.getElementById('arousal-handle').style.left = `${aPct}%`;
            updateDetectedState(parseFloat(v), parseFloat(a));
            updateEmotionMap(parseFloat(v), parseFloat(a));
        }

        function updateEmotionMap(v, a) {
            const mapPoint = document.getElementById('map-point');
            const mapDesc = document.getElementById('map-description');
            const leftPercent = ((v + 1) / 2) * 100;
            const topPercent = ((1 - a) / 2) * 100;
            mapPoint.style.left = `${leftPercent}%`;
            mapPoint.style.top = `${topPercent}%`;
            let valenceText = v >= 0 ? "Positive" : "Negative";
            let arousalText = a >= 0 ? "High Arousal" : "Low Arousal";
            mapDesc.textContent = `${valenceText}, ${arousalText}`;
        }

        function updateDetectedState(v, a) {
            const titleEl = document.getElementById('detected-state-title');
            const descEl = document.getElementById('detected-state-desc');
            let state = "", description = "";
            if (v > 0) {
                if (a > 0) { state = 'Excited <span class="text-[#7f5af0]">&</span> Happy'; description = "Energetic state."; }
                else { state = 'Peaceful <span class="text-[#7f5af0]">&</span> Relaxed'; description = "Calm state."; }
            } else {
                if (a > 0) { state = 'Stressed <span class="text-[#7f5af0]">&</span> Alert'; description = "Anxiety indicators."; }
                else { state = 'Sad <span class="text-[#7f5af0]">&</span> Lethargic'; description = "Low energy state."; }
            }
            titleEl.innerHTML = state;
            descEl.textContent = description;
        }

        runNeuroArt();
        setInterval(runNeuroArt, 10000);  // every 10 seconds

        // ── CALIBRATION ───────────────────────────────────────────────────────
        (function () {
            const btn = document.getElementById('btn-kalibre-et');
            const status = document.getElementById('kalibrasyon-durumu');
            const led = document.getElementById('kalibrasyon-led');

            function setStatus(text, color) {
                status.textContent = text;
                // color: 'gray' | 'yellow' | 'green' | 'red'
                led.className = `size-2 rounded-full flex-shrink-0 ${color === 'yellow' ? 'bg-yellow-400 animate-pulse' :
                        color === 'green' ? 'bg-[#38e07b]' :
                            color === 'red' ? 'bg-red-400' :
                                'bg-gray-400'
                    }`;
            }

            btn.addEventListener('click', function () {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                setStatus('Kalibre ediliyor, hareketsiz durun...', 'yellow');

                fetch('/baseline?duration=15', { method: 'POST' })
                    .then(function (res) { return res.json(); })
                    .then(function (data) {
                        if (data.status === 'ok') {
                            setStatus(
                                'Kalibrasyon OK  │  V: ' + data.baseline_v.toFixed(3) +
                                '  A: ' + data.baseline_a.toFixed(3),
                                'green'
                            );
                        } else {
                            setStatus('Hata: ' + (data.error || 'Bilinmiyor'), 'red');
                        }
                    })
                    .catch(function (err) {
                        console.error('Kalibrasyon hatası:', err);
                        setStatus('Bağlantı hatası!', 'red');
                    })
                    .finally(function () {
                        btn.disabled = false;
                        btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    });
            });
        })();
    </script>
</body>

</html>
